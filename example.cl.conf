# Claude Configuration Template
# Copy this to .cl.conf or run 'cl -c' to initialize

# Ensure Claude is in PATH (adjust if needed)
export PATH="$HOME/.local/bin:$PATH"

# Default flags for Claude
CL_FLAGS="--chrome --permission-mode dontAsk --dangerously-skip-permissions"

# Internal files
LOG_FILE="claude.log"
QUEUE_FILE=".claude_queue"
LOCK_FILE=".cl.lock"
